<ngx-loading-bar></ngx-loading-bar>
@if (!isMobile()) {
  <main class="flex app-container">
    <img
      src="../../assets/images/title.svg"
      id="title-image"
      alt="Website Title"
      class="top-left-corner cursor-pointer"
      (click)="goToMainPage()"
    />
    <section class="flex content">
      <router-outlet></router-outlet>
    </section>
  <a href="https://github.com/Babali42/DrumBeatRepo/issues/270" target="_blank" rel="noopener noreferrer" style="position: absolute; top: 15px; right: 20px; color: white; text-decoration: underline; font-weight: bold; z-index: 50;">
  {{ 'contribute.button' | translate }}
</a></main>
} @else if (isMobile() && isLandscape) {
  <main class="app-container">
    <section class="flex content">
      <router-outlet></router-outlet>
    </section>
  <a href="https://github.com/Babali42/DrumBeatRepo/issues/270" target="_blank" rel="noopener noreferrer" style="position: absolute; top: 15px; right: 20px; color: white; text-decoration: underline; font-weight: bold; z-index: 50;">
  {{ 'contribute.button' | translate }}
</a></main>
} @else if (isMobile() && isPortrait) {
  <header class="header-mobile mt-40 mb-40">
    <img
      src="../../assets/images/title-mobile.svg"
      class="title-image-mobile"
      alt="Website Title"
    />
  </header>
  <div class="portrait-to-landscape">
    <img
      [src]="mode == Mode.LIGHT ? '../../assets/images/light/orientation.png' : `../../assets/images/dark/orientation.png`"
      class="portrait-to-landscape-image"
      alt="Portrait to landscape image"
    />
  </div>
  <div class="ml-10">
    <h1>{{ 'portraitMode.onlyAvailableInLandscapeMode' | translate }}</h1>
    <h3>{{ 'portraitMode.turnYourDevice' | translate }}</h3>
  </div>
}
