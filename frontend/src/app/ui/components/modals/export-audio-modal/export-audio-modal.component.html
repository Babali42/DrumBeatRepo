@if(isOpen){
  <div class="modal-overlay" (click)="onOverlayClick($event)">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="exportDialogTitle">
      <div class="modal-header">
        <h2 id="exportDialogTitle">{{ 'export.title' | translate }}</h2>
        <button class="close-btn" aria-label="Close export dialog" (click)="onClose()">×</button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label for="beatName">{{ 'export.beat' | translate }}</label>
          <input id="beatName" type="text" [value]="beatName" readonly class="beat-name-input" />
        </div>

        <div class="form-group">
          <label for="loopCount">{{ 'export.duration' | translate }}</label>
          <select id="loopCount" [(ngModel)]="options.loopCount" class="form-select">
            @for (count of loopCounts; track count) {
              <option [value]="count">{{ count }} {{ count > 1 ? ('export.loops' | translate) : ('export.loop' | translate) }}</option>
            }
          </select>
        </div>

        <!-- TODO: MP3 support -->
        <!-- <div class="form-group">
          <label for="format">Format</label>
          <select id="format" [(ngModel)]="options.format" class="form-select">
            <option *ngFor="let format of formats" [value]="format">{{ format | uppercase }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="quality">Quality (kbps)</label>
          <select id="quality" [(ngModel)]="options.quality" class="form-select">
            <option *ngFor="let q of qualities" [value]="q">{{ q }} kbps</option>
          </select>
        </div> -->
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="onClose()">{{ 'export.cancel' | translate }}</button>
        <button class="btn btn-primary" (click)="onExport()">{{ 'export.export' | translate }}</button>
      </div>
    </div>
  </div>
}
