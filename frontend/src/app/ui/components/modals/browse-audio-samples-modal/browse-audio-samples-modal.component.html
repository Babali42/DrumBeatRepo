@if(isOpen){
<div class="modal-overlay" (click)="onOverlayClick($event)">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="browseSampleDialogTitle">
        <div class="modal-header">
            <h2 id="browseSampleDialogTitle">{{ 'add-track.title' | translate }}</h2>
            <button class="close-btn" aria-label="Close browse sample dialog" (click)="onClose()">×</button>
        </div>

        <div class="modal-body">
            <ul>
                @for(track of this.tracks; track track){
                <li>
                    {{track.name}} | {{midiDrumTypeToTextService.getMidiDrumTypeText(track.midiNote)}}
                </li>
                }
            </ul>
        </div>

        <div class="modal-footer">
            <button class="btn btn-secondary" (click)="onClose()">{{ 'misc.cancel' | translate }}</button>
            <button class="btn btn-primary" (click)="onValidate()" [disabled]="!this.form.valid">{{ 'misc.validate' |
                translate }}</button>
        </div>
    </div>
</div>
}
