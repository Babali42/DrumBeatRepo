name: Angular Tests

on:
  pull_request:
    branches: [ "main" ]
    paths: [ 'frontend/**', '.github/**' ]

jobs:
  test:
    permissions:
      contents: read

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Test
        uses: ./.github/actions/test/
        with:
          codecov_token: ${{ secrets.CODECOV_TOKEN }}
