name: AngularTest
description: Validate Angular project — ESLint, Karma, Vitest, coverage, and i18n

inputs:
  codecov_token:
    description: 'Codecov upload token'
    required: true

runs:
  using: composite
  steps:
    - name: Download Scala.js artifact
      uses: actions/download-artifact@v4
      with:
        name: scalajs-artifact
        path: frontend/engine/

    - name: Post-process Scala.js output
      run: echo 'globalThis.SequencerEngine = SequencerEngine;' >> frontend/engine/main.js
      working-directory: .
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '26'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: ./frontend

    - name: Run ESLint
      run: npm run lint
      shell: bash
      working-directory: ./frontend

    - name: Run angular/karma tests
      run: npm run test-ci
      shell: bash
      working-directory: ./frontend

    - name: Run vitest
      run: npm run test-vitest-coverage
      shell: bash
      working-directory: ./frontend

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v7
      with:
        token: ${{ inputs.codecov_token }}
        files: frontend/coverage/ng17-lib-test/lcov.info,frontend/coverage/vitest/lcov.info
        fail_ci_if_error: true

    - name: Verify i18n translations
      run: bash ./verify_i18n_json.sh
      shell: bash
      working-directory: ./frontend
