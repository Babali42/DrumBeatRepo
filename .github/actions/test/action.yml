name: Test
description: Validate Angular project — ESLint, Karma, Vitest, coverage, and i18n

inputs:
  codecov_token:
    description: 'Codecov upload token'
    required: true

runs:
  using: composite
  steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '26'
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci
      shell: bash
      working-directory: ./frontend

    - name: Run ESLint
      run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file eslint-results.sarif
      shell: bash
      working-directory: ./frontend

    - name: Upload ESLint results to GitHub
      if: always()
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: frontend/eslint-results.sarif
        wait-for-processing: true

    - name: Run angular/karma tests
      run: npm run test-ci
      shell: bash
      working-directory: ./frontend

    - name: Run vitest
      run: npm run test-vitest-coverage
      shell: bash
      working-directory: ./frontend

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v6
      with:
        token: ${{ inputs.codecov_token }}
        files: frontend/coverage/ng17-lib-test/lcov.info,frontend/coverage/vitest/lcov.info
        fail_ci_if_error: true

    - name: Verify i18n translations
      run: bash ./verify_i18n_json.sh
      shell: bash
      working-directory: ./frontend
